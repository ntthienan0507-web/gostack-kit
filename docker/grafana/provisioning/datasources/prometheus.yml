# Grafana provisioning — auto-configure Prometheus datasource on startup
# Docs: https://grafana.com/docs/grafana/latest/administration/provisioning/#data-sources
apiVersion: 1

deleteDatasources: []

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    version: 1
    jsonData:
      httpMethod: POST
      timeInterval: "15s"
