;; PgBouncer configuration
;; Docs: https://www.pgbouncer.org/config.html

[databases]
;; Route all connections to PostgreSQL
;; App connects to PgBouncer on port 6432 → PgBouncer forwards to postgres:5432
myapp = host=postgres port=5432 dbname=myapp

[pgbouncer]
;; Listen on all interfaces, port 6432
listen_addr = 0.0.0.0
listen_port = 6432

;; Authentication
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

;; Pool mode:
;;   session     = connection held for entire session (like no PgBouncer)
;;   transaction = connection returned after each transaction (RECOMMENDED)
;;   statement   = connection returned after each statement (breaks multi-statement TX)
pool_mode = transaction

;; Pool sizing
;; max_client_conn:  how many app connections PgBouncer accepts
;; default_pool_size: actual PostgreSQL connections PER database
;; min_pool_size:    keep this many connections warm
;; reserve_pool_size: extra connections for burst traffic
max_client_conn = 500
default_pool_size = 20
min_pool_size = 5
reserve_pool_size = 5

;; Timeouts
;; server_idle_timeout: close idle PG connections after this time
;; server_lifetime:     recycle PG connections after this time (regardless of idle)
;; client_idle_timeout: disconnect idle client after this time (0 = disabled)
;; query_timeout:       kill queries running longer than this (0 = disabled)
server_idle_timeout = 600
server_lifetime = 3600
client_idle_timeout = 0
query_timeout = 0

;; Logging
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1

;; Stats
stats_period = 60

;; Admin console: connect via `psql -p 6432 pgbouncer` to see pool stats
admin_users = postgres
