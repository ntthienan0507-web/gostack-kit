version: "2"
sql:
  - engine: "postgresql"
    queries: "./db/queries"
    schema: "./db/migrations"
    gen:
      go:
        package: "db"
        sql_package: "pgx/v5"
        out: "./db/sqlc"
        emit_interface: true
        emit_json_tags: true
        emit_result_struct_pointers: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "jsonb"
            go_type: "encoding/json.RawMessage"
          - db_type: "json"
            go_type: "encoding/json.RawMessage"
          - db_type: "timestamptz"
            go_type: "database/sql.NullTime"
            nullable: true
